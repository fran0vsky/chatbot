@if (message.role === 'user') {
  <div class="flex w-full justify-end">
    <div class="max-w-[75%] rounded-2xl rounded-br-sm px-4 py-2 bg-blue-500 text-white whitespace-pre-wrap break-words">
      {{ message.text }}
    </div>
  </div>
} @else if (message.role === 'error') {
  <div class="flex w-full justify-start">
    <div class="max-w-[75%] rounded-2xl rounded-bl-sm px-4 py-2 bg-red-50 border border-red-200 text-red-700 whitespace-pre-wrap break-words flex items-start gap-2">
      <svg class="w-4 h-4 mt-0.5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.515 2.625H3.72c-1.345 0-2.188-1.458-1.515-2.625L8.485 2.495zM10 6a1 1 0 011 1v3a1 1 0 11-2 0V7a1 1 0 011-1zm0 7a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd" />
      </svg>
      {{ message.text }}
    </div>
  </div>
} @else if (typing) {
  <div class="flex w-full justify-start">
    <div class="max-w-[75%] rounded-2xl rounded-bl-sm px-4 py-2 bg-gray-100 text-gray-800 flex items-center gap-1">
      <span class="inline-block w-1.5 h-1.5 rounded-full bg-gray-500 animate-bounce" [style.animation-delay]="'0ms'"></span>
      <span class="inline-block w-1.5 h-1.5 rounded-full bg-gray-500 animate-bounce" [style.animation-delay]="'150ms'"></span>
      <span class="inline-block w-1.5 h-1.5 rounded-full bg-gray-500 animate-bounce" [style.animation-delay]="'300ms'"></span>
    </div>
  </div>
} @else {
  <div class="flex w-full justify-start">
    <div class="max-w-[75%] rounded-2xl rounded-bl-sm px-4 py-2 bg-gray-100 text-gray-800 whitespace-pre-wrap break-words">
      {{ message.text }}
    </div>
  </div>
}
