<div class="flex flex-col h-screen bg-desert-sand dark:bg-desert-night">
  <app-chat-header
    [isDayMode]="isDayMode"
    [selectedModel]="selectedModel"
    [models]="models"
    [disabled]="isLoading"
    (themeToggled)="toggleTheme()"
    (newChat)="newChat()"
    (modelChange)="selectedModel = $event"
  />

  <main class="flex-1 overflow-y-auto px-4 py-4 space-y-3 chat-scroll-area">
    @for (m of messages; track $index) {
      <app-message-bubble [message]="m" [animate]="$index >= 1" />
    }
    @if (isLoading) {
      <app-message-bubble [message]="{ text: '', role: 'assistant' }" [typing]="true" [animate]="true" />
    }
    <div #messageEnd></div>
  </main>

  <app-chat-input
    [placeholder]="placeholder"
    [disabled]="isLoading"
    (send)="onSend($event)"
  />
</div>
