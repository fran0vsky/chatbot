<div class="flex flex-col h-screen bg-white">
  <header class="flex justify-between items-center px-4 py-3 border-b border-gray-200 bg-white">
    <h1 class="text-lg font-semibold text-gray-900">Chatbot</h1>
    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="newChat()"
        [disabled]="isLoading"
        class="flex items-center justify-center w-8 h-8 rounded text-gray-600 hover:bg-gray-100 transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 3.487a2.25 2.25 0 113.182 3.182L7.5 19.213l-4.5 1 1-4.5L16.862 3.487z" />
        </svg>
        <span class="sr-only">New chat</span>
      </button>
      <select
        [value]="selectedModel"
        (change)="selectedModel = $any($event.target).value"
        [disabled]="isLoading"
        class="appearance-none bg-white border border-gray-300 rounded px-2 py-1 text-sm cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
        @for (m of models; track m.id) {
          <option [value]="m.id">{{ m.label }}</option>
        }
      </select>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
    @for (m of messages; track $index) {
      <app-message-bubble [message]="m" />
    }
    @if (isLoading) {
      <app-message-bubble [message]="{ text: '', role: 'assistant' }" [typing]="true" />
    }
    <div #messageEnd></div>
  </main>

  <form class="border-t border-gray-200 px-4 py-3 bg-white" (submit)="$event.preventDefault(); send()">
    <div class="flex items-end gap-2">
      <textarea
        #textareaRef
        rows="1"
        [placeholder]="placeholder"
        class="flex-1 resize-none rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100 disabled:cursor-not-allowed"
        [(ngModel)]="draft"
        name="draft"
        [disabled]="isLoading"
        (keydown)="onKeydown($event)"
        (input)="autoResize(textareaRef); stopPlaceholderRotation()"
        (focus)="stopPlaceholderRotation()"
      ></textarea>
      <button
        type="submit"
        [disabled]="isLoading || draft.trim().length === 0"
        class="flex items-center justify-center w-10 h-10 rounded-lg bg-blue-500 text-white hover:bg-blue-600 active:scale-95 transition disabled:bg-gray-300 disabled:cursor-not-allowed"
      >
        <svg class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M3.105 3.105a.75.75 0 01.815-.163l13.5 5.625a.75.75 0 010 1.376l-13.5 5.625a.75.75 0 01-1.04-.819l1.43-5.722L9.5 10 4.31 9.073l-1.43-5.722a.75.75 0 01.225-.246z" />
        </svg>
        <span class="sr-only">Send</span>
      </button>
    </div>
  </form>
</div>
