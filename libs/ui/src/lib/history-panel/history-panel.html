@if (open) {
  <div
    class="fixed inset-0 bg-black/40 z-30"
    (click)="closed.emit()"
    aria-hidden="true"
  ></div>
}

<aside
  class="fixed inset-y-0 left-0 z-40 w-72 flex flex-col bg-desert-header dark:bg-desert-night-surface border-r border-desert-border dark:border-desert-night-border transition-transform duration-300 ease-in-out"
  [class.translate-x-0]="open"
  [class.-translate-x-full]="!open"
  aria-label="Conversation history"
>
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-desert-border dark:border-desert-night-border flex-shrink-0">
    <h2 class="font-title text-sm font-semibold uppercase text-desert-brown dark:text-desert-night-text tracking-wide">
      History
    </h2>
    <button
      type="button"
      (click)="closed.emit()"
      class="p-1 rounded text-desert-brown-muted dark:text-desert-night-muted hover:bg-desert-border dark:hover:bg-desert-night-border hover:text-desert-brown dark:hover:text-desert-night-text transition-colors"
      aria-label="Close history panel"
    >
      <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
      </svg>
    </button>
  </div>

  <!-- New Chat button -->
  <div class="px-3 py-2 flex-shrink-0 border-b border-desert-border dark:border-desert-night-border">
    <button
      type="button"
      (click)="newChat.emit()"
      class="w-full flex items-center gap-2 px-3 py-2 rounded text-sm font-medium text-desert-brown dark:text-desert-night-text hover:bg-desert-border dark:hover:bg-desert-night-border transition-colors"
    >
      <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      New chat
    </button>
  </div>

  <!-- Session list -->
  <div class="flex-1 overflow-y-auto py-1">
    @for (session of sessions; track session.id) {
      <div
        class="group relative flex items-start gap-2 px-3 py-2 mx-1 my-0.5 rounded cursor-pointer transition-colors"
        [class.bg-desert-parchment]="session.id === activeSessionId"
        [class.dark:bg-desert-night-parchment]="session.id === activeSessionId"
        [class.hover:bg-desert-border]="session.id !== activeSessionId"
        [class.dark:hover:bg-desert-night-border]="session.id !== activeSessionId"
        (click)="sessionSelected.emit(session)"
        role="button"
        [attr.aria-current]="session.id === activeSessionId ? 'true' : null"
      >
        <div class="flex-1 min-w-0">
          <p class="text-sm text-desert-brown dark:text-desert-night-text truncate leading-snug">
            {{ session.title }}
          </p>
          <p class="text-xs text-desert-brown-muted dark:text-desert-night-muted mt-0.5">
            {{ formatDate(session.createdAt) }}
          </p>
        </div>
        <button
          type="button"
          (click)="onDeleteClick($event, session.id)"
          class="flex-shrink-0 mt-0.5 p-0.5 rounded opacity-0 group-hover:opacity-100 text-desert-brown-muted dark:text-desert-night-muted hover:text-desert-brown dark:hover:text-desert-night-text transition-opacity"
          aria-label="Delete conversation"
        >
          <svg class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
          </svg>
        </button>
      </div>
    } @empty {
      <p class="text-sm text-desert-brown-muted dark:text-desert-night-muted text-center py-8 px-4">
        No conversations yet
      </p>
    }
  </div>
</aside>
