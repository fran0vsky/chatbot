<form
  class="w-full bg-transparent"
  (submit)="$event.preventDefault(); submit()"
>
  <div class="w-full rounded-full bg-jungle-surface/70 dark:bg-jungle-night-surface/70 backdrop-blur-md border border-jungle-border/40 dark:border-jungle-night-border/60 pl-3 pr-2 py-2 shadow-[0_8px_28px_-10px_rgba(0,0,0,0.4)] dark:shadow-[0_12px_36px_-8px_rgba(0,0,0,0.6)] transition-all focus-within:border-jungle-accent/60 dark:focus-within:border-jungle-night-accent/60 focus-within:ring-2 focus-within:ring-jungle-accent/20 dark:focus-within:ring-jungle-night-accent/20">
    <div class="flex items-center gap-1">
      <!-- Left affordances -->
      <button
        type="button"
        class="flex items-center justify-center w-8 h-8 rounded-full text-jungle-ink-muted dark:text-jungle-night-muted hover:text-jungle-accent dark:hover:text-jungle-night-accent hover:bg-jungle-surface/60 dark:hover:bg-jungle-night-surface/60 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent"
        aria-label="Attach file"
        title="Attach (coming soon)"
      >
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <button
        type="button"
        class="flex items-center justify-center w-8 h-8 rounded-full text-jungle-ink-muted dark:text-jungle-night-muted hover:text-jungle-accent dark:hover:text-jungle-night-accent hover:bg-jungle-surface/60 dark:hover:bg-jungle-night-surface/60 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent"
        aria-label="Insert emoji"
        title="Emoji (coming soon)"
      >
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </button>
      <button
        type="button"
        class="flex items-center justify-center w-8 h-8 rounded-full text-jungle-ink-muted dark:text-jungle-night-muted hover:text-jungle-accent dark:hover:text-jungle-night-accent hover:bg-jungle-surface/60 dark:hover:bg-jungle-night-surface/60 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent"
        aria-label="Voice input"
        title="Voice (coming soon)"
      >
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <textarea
        #textareaRef
        data-testid="message-input"
        rows="1"
        [placeholder]="placeholder"
        class="flex-1 resize-none bg-transparent text-jungle-ink dark:text-jungle-night-text placeholder:text-jungle-ink-muted/70 dark:placeholder:text-jungle-night-muted/70 px-3 py-1.5 text-sm focus:outline-none disabled:opacity-60 disabled:cursor-not-allowed"
        [class.overflow-y-auto]="atMaxHeight"
        [class.overflow-hidden]="!atMaxHeight"
        [(ngModel)]="draft"
        name="draft"
        [disabled]="disabled && !loading"
        (keydown)="onKeydown($event)"
        (input)="autoResize(textareaRef)"
      ></textarea>

      @if (loading) {
        <button type="button" (click)="submit()"
          [attr.aria-label]="'Stop response'"
          [attr.title]="'Stop response'"
          class="flex-shrink-0 flex items-center justify-center w-9 h-9 rounded-full bg-jungle-accent dark:bg-jungle-night-accent text-jungle-user-ink hover:bg-jungle-accent-dark dark:hover:bg-jungle-night-accent-dark active:scale-95 transition shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent focus-visible:ring-offset-2 focus-visible:ring-offset-jungle-bg dark:focus-visible:ring-offset-jungle-night">
          <svg class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <rect x="4" y="4" width="12" height="12" rx="1.5" />
          </svg>
          <span class="sr-only">Stop</span>
        </button>
      } @else {
        <button type="submit" [disabled]="disabled || draft.trim().length === 0"
          aria-label="Send message"
          title="Send"
          class="flex-shrink-0 flex items-center justify-center w-9 h-9 rounded-full bg-jungle-accent dark:bg-jungle-night-accent text-jungle-user-ink hover:bg-jungle-accent-dark dark:hover:bg-jungle-night-accent-dark active:scale-95 transition shadow-md disabled:opacity-50 disabled:cursor-not-allowed focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent focus-visible:ring-offset-2 focus-visible:ring-offset-jungle-bg dark:focus-visible:ring-offset-jungle-night">
          <svg class="w-4 h-4 -mr-0.5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39 1.05L4 11l9 1-9 1-1.99 6.35c-.15.65.52 1.21 1.39 1.05z"/>
          </svg>
          <span class="sr-only">Send</span>
        </button>
      }
    </div>
  </div>
</form>
