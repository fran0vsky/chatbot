<form
  class="w-full bg-transparent"
  (submit)="$event.preventDefault(); submit()"
>
  <div class="w-full rounded-full bg-jungle-surface/70 dark:bg-jungle-night-surface/70 backdrop-blur-md border border-jungle-border/40 dark:border-jungle-night-border/60 pl-3 pr-2 py-2 shadow-[0_8px_28px_-10px_rgba(0,0,0,0.4)] dark:shadow-[0_12px_36px_-8px_rgba(0,0,0,0.6)] transition-all focus-within:border-jungle-accent/60 dark:focus-within:border-jungle-night-accent/60 focus-within:ring-2 focus-within:ring-jungle-accent/20 dark:focus-within:ring-jungle-night-accent/20">
    <div class="flex items-center gap-1">
      <!-- Tools toggle (popover with checkboxes for each available tool) -->
      <div #toolsPopover class="relative">
        <button
          type="button"
          (click)="toggleToolsPopover()"
          [attr.aria-expanded]="toolsOpen"
          [attr.aria-haspopup]="'true'"
          [class.text-jungle-accent]="toolsOpen"
          [class.dark:text-jungle-night-accent]="toolsOpen"
          class="flex items-center justify-center w-8 h-8 rounded-full text-jungle-ink-muted dark:text-jungle-night-muted hover:text-jungle-accent dark:hover:text-jungle-night-accent hover:bg-jungle-surface/60 dark:hover:bg-jungle-night-surface/60 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent"
          aria-label="Tools"
          title="Tools available to Spino"
        >
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          @if (tools.length > 0 && enabledToolNames.length < tools.length) {
            <span class="absolute top-1 right-1 w-1.5 h-1.5 rounded-full bg-amber-400" aria-hidden="true"></span>
          }
        </button>
        @if (toolsOpen) {
          <div class="absolute bottom-full left-0 mb-2 w-72 rounded-xl bg-jungle-surface dark:bg-jungle-night-card border border-jungle-border/60 dark:border-jungle-night-border/60 shadow-xl p-3 z-50">
            <div class="flex items-center justify-between mb-2">
              <h3 class="text-xs uppercase tracking-wide text-jungle-ink-muted dark:text-jungle-night-muted">Tools</h3>
              <span class="text-[10px] text-jungle-ink-muted dark:text-jungle-night-muted">{{ enabledToolNames.length }} / {{ tools.length }} enabled</span>
            </div>
            <ul class="space-y-1.5">
              @for (t of tools; track t.name) {
                <li>
                  <label class="flex items-start gap-2 p-2 rounded-lg hover:bg-jungle-bg/40 dark:hover:bg-jungle-night/40 cursor-pointer">
                    <input
                      type="checkbox"
                      [checked]="isToolEnabled(t.name)"
                      (change)="onToolCheckboxChange(t.name, $event)"
                      class="mt-0.5 w-3.5 h-3.5 rounded accent-jungle-accent dark:accent-jungle-night-accent flex-shrink-0"
                    />
                    <span class="flex-1 min-w-0">
                      <span class="block text-sm font-medium text-jungle-ink dark:text-jungle-night-text">{{ t.label }}</span>
                      <span class="block text-[11px] text-jungle-ink-muted dark:text-jungle-night-muted leading-snug">{{ t.description }}</span>
                    </span>
                  </label>
                </li>
              }
            </ul>
          </div>
        }
      </div>
      <button
        type="button"
        class="flex items-center justify-center w-8 h-8 rounded-full text-jungle-ink-muted dark:text-jungle-night-muted hover:text-jungle-accent dark:hover:text-jungle-night-accent hover:bg-jungle-surface/60 dark:hover:bg-jungle-night-surface/60 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent"
        aria-label="Insert emoji"
        title="Emoji (coming soon)"
      >
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </button>
      @if (sttSupported) {
        <!-- Mic button: hidden entirely when SpeechRecognition is unsupported (e.g. Firefox) -->
        <div class="relative flex items-center justify-center">
          <!-- Pulse ring overlay — visible only while listening -->
          @if (listening) {
            <span
              class="absolute inline-flex h-8 w-8 rounded-full bg-jungle-accent dark:bg-jungle-night-accent opacity-40 animate-ping"
              aria-hidden="true"
            ></span>
          }
          <button
            type="button"
            (click)="micToggle.emit()"
            [attr.aria-pressed]="listening"
            [attr.aria-label]="listening ? 'Stop dictation' : 'Start dictation'"
            title="Voice input — audio is processed by your browser"
            [class.text-jungle-accent]="listening"
            [class.dark:text-jungle-night-accent]="listening"
            [class.text-jungle-ink-muted]="!listening"
            [class.dark:text-jungle-night-muted]="!listening"
            [class.opacity-50]="disabled && !loading"
            [class.cursor-not-allowed]="disabled && !loading"
            class="relative flex items-center justify-center w-8 h-8 rounded-full hover:text-jungle-accent dark:hover:text-jungle-night-accent hover:bg-jungle-surface/60 dark:hover:bg-jungle-night-surface/60 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
        </div>
      }

      <textarea
        #textareaRef
        data-testid="message-input"
        rows="1"
        [placeholder]="placeholder"
        class="flex-1 resize-none bg-transparent text-jungle-ink dark:text-jungle-night-text placeholder:text-jungle-ink-muted/70 dark:placeholder:text-jungle-night-muted/70 px-3 py-1.5 text-sm focus:outline-none disabled:opacity-60 disabled:cursor-not-allowed"
        [class.overflow-y-auto]="atMaxHeight"
        [class.overflow-hidden]="!atMaxHeight"
        [(ngModel)]="draft"
        name="draft"
        [disabled]="disabled && !loading"
        (keydown)="onKeydown($event)"
        (input)="autoResize(textareaRef)"
      ></textarea>

      @if (loading) {
        <button type="button" (click)="submit()"
          [attr.aria-label]="'Stop response'"
          [attr.title]="'Stop response'"
          class="flex-shrink-0 flex items-center justify-center w-9 h-9 rounded-full bg-jungle-accent dark:bg-jungle-night-accent text-jungle-user-ink hover:bg-jungle-accent-dark dark:hover:bg-jungle-night-accent-dark active:scale-95 transition shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent focus-visible:ring-offset-2 focus-visible:ring-offset-jungle-bg dark:focus-visible:ring-offset-jungle-night">
          <svg class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <rect x="4" y="4" width="12" height="12" rx="1.5" />
          </svg>
          <span class="sr-only">Stop</span>
        </button>
      } @else {
        <button type="submit" [disabled]="disabled || draft.trim().length === 0"
          aria-label="Send message"
          title="Send"
          class="flex-shrink-0 flex items-center justify-center w-9 h-9 rounded-full bg-jungle-accent dark:bg-jungle-night-accent text-jungle-user-ink hover:bg-jungle-accent-dark dark:hover:bg-jungle-night-accent-dark active:scale-95 transition shadow-md disabled:opacity-50 disabled:cursor-not-allowed focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent focus-visible:ring-offset-2 focus-visible:ring-offset-jungle-bg dark:focus-visible:ring-offset-jungle-night">
          <svg class="w-4 h-4 -mr-0.5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39 1.05L4 11l9 1-9 1-1.99 6.35c-.15.65.52 1.21 1.39 1.05z"/>
          </svg>
          <span class="sr-only">Send</span>
        </button>
      }
    </div>
  </div>
</form>
