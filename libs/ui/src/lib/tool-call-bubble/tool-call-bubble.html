<div class="my-3 mx-auto w-full max-w-3xl px-3 py-2 rounded-md border border-desert-border dark:border-desert-night-border bg-desert-parchment/60 dark:bg-desert-night-parchment/60 text-sm text-desert-brown-muted dark:text-desert-night-muted">
  <button
    type="button"
    class="flex items-center justify-between w-full font-mono text-xs uppercase tracking-wide focus:outline-none"
    (click)="toggle()"
    [attr.aria-expanded]="expanded"
  >
    <span>Tool call · {{ message.toolName }}</span>
    <span aria-hidden="true">{{ expanded ? '▾' : '▸' }}</span>
  </button>

  @if (expanded) {
    <div class="mt-2">
      <p class="text-[10px] uppercase tracking-wide mb-1 opacity-70">Arguments</p>
      <pre class="text-xs whitespace-pre-wrap font-mono bg-desert-parchment dark:bg-desert-night-parchment p-2 rounded">{{ prettyArgs }}</pre>
    </div>
  }

  <div class="mt-2">
    <p class="text-[10px] uppercase tracking-wide mb-1 opacity-70">Result</p>
    <pre class="text-xs whitespace-pre-wrap font-mono text-desert-brown dark:text-desert-night-text">{{ resultText }}</pre>
  </div>
</div>
