<aside
  class="hidden flex-col w-[320px] flex-shrink-0 relative overflow-hidden border-l border-jungle-border/40 dark:border-jungle-night-border/60"
>
  <!-- Transparent mascot sprite layered over the app-wide jungle bg -->
  <div
    class="absolute inset-x-0 bottom-[12%] top-[15%] bg-[length:170%_auto] bg-bottom bg-no-repeat dark:hidden drop-shadow-[0_8px_14px_rgba(0,0,0,0.55)]"
    style="background-image: url('/spino/mascot-day.png');"
    aria-hidden="true"
  ></div>
  <div
    class="absolute inset-x-0 bottom-[12%] top-[15%] bg-[length:170%_auto] bg-bottom bg-no-repeat hidden dark:block drop-shadow-[0_8px_14px_rgba(0,0,0,0.6)]"
    style="background-image: url('/spino/mascot-night.png');"
    aria-hidden="true"
  ></div>
  <!-- Subtle bottom fade for footer text legibility -->
  <div
    class="absolute inset-x-0 bottom-0 h-1/3 bg-gradient-to-t from-jungle-bg/80 via-jungle-bg/30 to-transparent dark:from-jungle-night/85 dark:to-transparent pointer-events-none"
    aria-hidden="true"
  ></div>

  <header class="relative z-10 flex items-center justify-between px-4 py-3 border-b border-jungle-border/30 dark:border-jungle-night-border/60 bg-jungle-bg/60 dark:bg-jungle-night/60 backdrop-blur-sm">
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,0.8)]"></span>
      <div class="flex flex-col leading-tight">
        <span class="text-sm font-semibold text-jungle-ink dark:text-jungle-night-text">Spino</span>
        <span class="text-[10px] text-jungle-ink-muted dark:text-jungle-night-muted">Online</span>
      </div>
    </div>
    <div class="flex items-center gap-1.5">
      <button
        type="button"
        (click)="themeToggled.emit()"
        class="p-1 rounded-full text-jungle-ink-muted dark:text-jungle-night-muted hover:text-jungle-accent dark:hover:text-jungle-night-accent transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-accent"
        [attr.aria-label]="isDayMode ? 'Switch to night mode' : 'Switch to day mode'"
        [title]="isDayMode ? 'Night mode' : 'Day mode'"
      >
        @if (isDayMode) {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
        }
      </button>
      <button
        type="button"
        class="p-1 rounded-full text-jungle-ink-muted dark:text-jungle-night-muted hover:text-jungle-accent dark:hover:text-jungle-night-accent transition-colors"
        aria-label="Toggle audio"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
      </button>
    </div>
  </header>

  <div class="relative z-10 flex-1"></div>

  <footer class="relative z-10 flex flex-col items-center gap-2 px-4 pb-6 pt-3 bg-gradient-to-t from-jungle-bg/95 to-transparent dark:from-jungle-night/95">
    <p class="text-sm font-medium text-jungle-ink dark:text-jungle-night-text transition-opacity duration-300">
      {{ status === 'thinking' ? 'Thinking…' : 'Listening…' }}
    </p>
    <div class="flex items-end gap-[2px] h-7">
      @for (bar of waveBars; track bar.i) {
        <span
          class="block w-[3px] rounded-sm bg-jungle-accent/70 dark:bg-jungle-night-accent/80 origin-bottom"
          [class.animate-spino-wave-idle]="status === 'idle'"
          [class.animate-spino-wave-thinking]="status === 'thinking'"
          [style.height.%]="bar.h"
          [style.animation-delay.ms]="bar.d"
        ></span>
      }
    </div>
    <p class="text-[11px] text-jungle-ink-muted dark:text-jungle-night-muted mt-1 transition-opacity duration-300">
      Spino is {{ status === 'thinking' ? 'thinking' : 'listening' }}
    </p>
    <div class="flex items-center gap-3 mt-0.5">
      @for (paw of [0,1,2]; track paw) {
        <svg
          class="w-3.5 h-3.5 text-jungle-accent dark:text-jungle-night-accent"
          [class.opacity-30]="status === 'idle'"
          [class.animate-spino-paw]="status === 'thinking'"
          [style.animation-delay.ms]="paw * 200"
          viewBox="0 0 24 24"
          fill="currentColor"
          aria-hidden="true"
        >
          <ellipse cx="12" cy="16" rx="5" ry="4"/>
          <ellipse cx="6" cy="9" rx="2" ry="2.5"/>
          <ellipse cx="10" cy="6" rx="2" ry="2.5"/>
          <ellipse cx="14" cy="6" rx="2" ry="2.5"/>
          <ellipse cx="18" cy="9" rx="2" ry="2.5"/>
        </svg>
      }
    </div>
  </footer>
</aside>
