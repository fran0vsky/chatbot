@if (hasReasoning()) {
  <div data-testid="reasoning-block" class="border-l-2 border-jungle-border dark:border-jungle-night-border pl-3 py-1 mb-2 flex flex-col gap-1">
    <button
      data-testid="reasoning-toggle"
      type="button"
      class="text-xs font-body font-medium leading-snug text-jungle-ink-muted dark:text-jungle-night-muted hover:underline focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-jungle-accent dark:focus-visible:ring-jungle-night-border rounded self-start"
      (click)="toggle()"
      [attr.aria-expanded]="!collapsed()"
      [attr.aria-label]="ariaLabel()">
      {{ toggleLabel() }}
    </button>
    @if (!collapsed()) {
      <div data-testid="reasoning-body" class="text-sm font-body leading-relaxed text-jungle-ink-muted dark:text-jungle-night-muted whitespace-pre-wrap">{{ reasoning }}</div>
    }
  </div>
}
