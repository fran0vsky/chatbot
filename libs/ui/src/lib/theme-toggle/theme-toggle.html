<button
  type="button"
  (click)="toggled.emit()"
  [disabled]="disabled"
  class="flex items-center justify-center w-9 h-9 rounded-full border border-studio-border dark:border-studio-night-border bg-studio-surface dark:bg-studio-night-card text-studio-ink dark:text-studio-night-accent shadow-sm hover:bg-studio-card dark:hover:bg-studio-night-surface hover:border-studio-accent dark:hover:border-studio-night-accent focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-studio-accent dark:focus-visible:ring-studio-night-accent focus-visible:ring-offset-1 focus-visible:ring-offset-studio-bg dark:focus-visible:ring-offset-studio-night-surface disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
  [attr.aria-label]="isDayMode ? 'Switch to night mode' : 'Switch to day mode'"
  [title]="isDayMode ? 'Switch to night mode' : 'Switch to day mode'"
>
  @if (isDayMode) {
    <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
    </svg>
  } @else {
    <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd" />
    </svg>
  }
</button>
