<header class="flex justify-between items-center px-4 py-3 border-b border-desert-border dark:border-desert-night-border bg-desert-header dark:bg-desert-night-surface">
  <h1 class="font-title text-lg font-semibold text-desert-brown dark:text-desert-night-text">Chatbot</h1>
  <div class="flex items-center gap-2">
    <app-theme-toggle
      [isDayMode]="isDayMode"
      [disabled]="disabled"
      (toggled)="themeToggled.emit()"
    />
    <app-new-chat-button
      [disabled]="disabled"
      (clicked)="newChat.emit()"
    />
    <app-model-selector
      [models]="models"
      [selectedModel]="selectedModel"
      [disabled]="disabled"
      (modelChange)="modelChange.emit($event)"
    />
  </div>
</header>
