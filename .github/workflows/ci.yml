name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Quality gate (all branches) ─────────────────────────────────────────────
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint affected
        run: npx nx affected --target=lint --base=origin/main --head=HEAD --parallel=3

      - name: Test affected
        run: npx nx affected --target=test --base=origin/main --head=HEAD --parallel=3 --ci

      - name: Build affected
        run: npx nx affected --target=build --base=origin/main --head=HEAD --parallel=3

  e2e:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx nx e2e frontend-e2e
        env:
          CI: 'true'
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            apps/frontend-e2e/test-output/
          retention-days: 7

  # ── Build backend Docker image (main only, runs parallel with e2e) ──────────
  build-backend-image:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: meta
        run: |
          echo "tag=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/backend:${{ github.sha }}" \
            >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy backend to GCE via SSH (after e2e passes) ────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [e2e, build-backend-image]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Ensure the VM's gcloud can pull from Artifact Registry
      - name: Configure Docker auth on GCE instance
        run: |
          gcloud compute ssh ${{ vars.GCE_INSTANCE }} \
            --zone=${{ vars.GCE_ZONE }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet"

      - name: Deploy backend container
        run: |
          gcloud compute ssh ${{ vars.GCE_INSTANCE }} \
            --zone=${{ vars.GCE_ZONE }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="/opt/chatbot/deploy.sh '${{ needs.build-backend-image.outputs.image }}' '${{ vars.FRONTEND_URL }}'"

  # ── Deploy Angular frontend to GCS ──────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend (production)
        run: npx nx build frontend --configuration=production

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync frontend to GCS
        run: |
          gcloud storage rsync dist/apps/frontend/browser \
            gs://${{ vars.FRONTEND_BUCKET }} \
            --recursive --delete-unmatched-destination-objects

          # index.html must never be served from cache so users get the latest shell
          gcloud storage objects update \
            gs://${{ vars.FRONTEND_BUCKET }}/index.html \
            --cache-control="no-cache, no-store, must-revalidate"

  # ── Deploy Storybook to GCS (after frontend succeeds) ───────────────────────
  deploy-storybook:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Storybook
        run: npm --workspace=libs/ui run build-storybook

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync Storybook to GCS
        run: |
          gcloud storage rsync dist/storybook/ui \
            gs://${{ vars.STORYBOOK_BUCKET }} \
            --recursive --delete-unmatched-destination-objects
