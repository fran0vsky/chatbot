name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Quality gate (all branches) ─────────────────────────────────────────────
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Guard against schema drift: schema.ts must always have a matching drizzle
      # migration. `generate` runs offline (diffs schema vs the committed snapshot);
      # if it would emit anything, a migration is missing — fail loudly. This is the
      # check that would have caught custom_dinos / dino_reactivity never being migrated.
      - name: Verify DB migrations match schema
        run: |
          cd apps/backend && npx drizzle-kit generate --name ci_drift_check && cd ../..
          if [ -n "$(git status --porcelain apps/backend/drizzle)" ]; then
            echo "::error::schema.ts has changes with no committed drizzle migration. Run 'npm run db:generate', harden the new SQL to IF NOT EXISTS, and commit it."
            git --no-pager status --porcelain apps/backend/drizzle
            git --no-pager diff -- apps/backend/drizzle
            exit 1
          fi

      - name: Lint affected
        run: npx nx affected --target=lint --base=origin/main --head=HEAD --parallel=3

      - name: Test affected
        run: npx nx affected --target=test --base=origin/main --head=HEAD --parallel=3 --ci

      - name: Build affected
        run: npx nx affected --target=build --base=origin/main --head=HEAD --parallel=3

  e2e:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx nx e2e frontend-e2e
        env:
          CI: 'true'
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            apps/frontend-e2e/test-output/
          retention-days: 7

  # ── Build backend Docker image (main only, runs parallel with e2e) ──────────
  build-backend-image:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: meta
        run: |
          echo "tag=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/backend:${{ github.sha }}" \
            >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy backend to GCE via SSH (after e2e passes) ────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [e2e, build-backend-image]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Pipe vm-deploy.sh through SSH stdin — Container-Optimized OS mounts
      # most writable dirs noexec, so writing the script to disk and chmod+x'ing
      # it doesn't work. `sudo bash -s -- args` reads the script from stdin and
      # passes positional args, sidestepping the noexec mounts entirely.
      - name: Deploy backend container
        env:
          GCE_INSTANCE: ${{ vars.GCE_INSTANCE }}
          GCE_ZONE: ${{ vars.GCE_ZONE }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          AVATAR_BUCKET: ${{ vars.AVATAR_BUCKET }}
          IMAGE: ${{ needs.build-backend-image.outputs.image }}
        run: |
          GCE_INSTANCE="${GCE_INSTANCE//[[:space:]]/}"
          GCE_ZONE="${GCE_ZONE//[[:space:]]/}"
          GCP_PROJECT_ID="${GCP_PROJECT_ID//[[:space:]]/}"
          FRONTEND_URL="${FRONTEND_URL//[[:space:]]/}"
          AVATAR_BUCKET="${AVATAR_BUCKET//[[:space:]]/}"
          # --quiet stops gcloud from prompting "Do you want to create .ssh
          # dir?" — otherwise that prompt reads from stdin and consumes the
          # script we're trying to pipe through.
          # Use IAP tunneling so we don't depend on OS Login pubkey propagation
          # (which sporadically races and yields "Permission denied (publickey)").
          gcloud --quiet compute ssh "$GCE_INSTANCE" \
            --zone="$GCE_ZONE" \
            --project="$GCP_PROJECT_ID" \
            --tunnel-through-iap \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="sudo bash -s -- '$IMAGE' '$FRONTEND_URL' '$AVATAR_BUCKET'" \
            < scripts/vm-deploy.sh

  # ── Deploy Storybook to GCS (after e2e passes) ─────────────────────────────
  # NOTE: @storybook/angular@8 doesn't yet support Angular 21's @angular/build
  # builder. Throws AngularLegacyBuildOptionsError. Real fix is to migrate
  # Storybook to v9 or wire the @storybook/angular:build-storybook executor in
  # a project.json. Marked continue-on-error so it doesn't block app deploys.
  deploy-storybook:
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Storybook
        run: npm --workspace=libs/ui run build-storybook

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync Storybook to GCS
        env:
          STORYBOOK_BUCKET: ${{ vars.STORYBOOK_BUCKET }}
        run: |
          STORYBOOK_BUCKET="${STORYBOOK_BUCKET//[[:space:]]/}"
          gcloud storage rsync dist/storybook/ui \
            "gs://$STORYBOOK_BUCKET" \
            --recursive --delete-unmatched-destination-objects

  # ── Post-deploy smoke checks (after backend deploy) ─────────────────────────
  smoke:
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Smoke-test live deploy
        run: |
          set -euo pipefail
          URL="https://dinoagents.duckdns.org"

          # ── Wait for backend to be ready (container may still be booting) ──────
          echo "Waiting for backend to be ready..."
          READY=false
          for attempt in $(seq 1 12); do
            if curl -fsS "$URL/api/health" > /dev/null 2>&1; then
              echo "✓ Backend ready after ~$((($attempt - 1) * 5))s"
              READY=true
              break
            fi
            echo "  Not ready yet (attempt $attempt/12), sleeping 5s..."
            sleep 5
          done
          if [ "$READY" != "true" ]; then
            echo "✗ Backend did not become ready after 60s"
            exit 1
          fi

          # ── Check 1: /api/dinos returns 200 and a non-empty JSON array ────────
          echo "Checking /api/dinos..."
          DINOS=$(curl -fsS "$URL/api/dinos")
          if echo "$DINOS" | jq -e 'type == "array" and length > 0' > /dev/null 2>&1; then
            echo "✓ /api/dinos returned a non-empty JSON array"
          else
            echo "✗ /api/dinos did not return a non-empty JSON array"
            echo "Response: $DINOS"
            exit 1
          fi

          # ── Check 2: streamed chat probe yields token + done events ───────────
          echo "Checking /api/agents/chat (SSE stream)..."
          CHAT_OK=false
          for attempt in 1 2 3; do
            echo "  Attempt $attempt/3..."
            STREAM=$(curl -fsS -N --max-time 60 \
              -H "Content-Type: application/json" \
              -d '{"message":"Reply with exactly the word PONG.","dinoId":"rexford"}' \
              "$URL/api/agents/chat" 2>&1 || true)

            # Check for HTTP 429 (rate limit) — retry
            if echo "$STREAM" | grep -q '"type":"error"' && echo "$STREAM" | grep -qi '429'; then
              echo "  Got 429 rate limit, sleeping 10s before retry..."
              sleep 10
              continue
            fi

            HAS_TOKEN=$(echo "$STREAM" | grep -c '"type":"token"' || true)
            HAS_DONE=$(echo "$STREAM" | grep -c '"type":"done"' || true)

            if [ "$HAS_TOKEN" -gt 0 ] && [ "$HAS_DONE" -gt 0 ]; then
              echo "✓ /api/agents/chat streamed token events and a done event"
              CHAT_OK=true
              break
            else
              echo "  Missing expected events (token=$HAS_TOKEN done=$HAS_DONE), sleeping 10s..."
              sleep 10
            fi
          done

          if [ "$CHAT_OK" != "true" ]; then
            echo "✗ /api/agents/chat did not yield a complete SSE stream after 3 attempts"
            exit 1
          fi

          # ── Check 3: /api/health reachable; web_search is optional ───────────
          # web_search depends on TAVILY_API_KEY being provisioned in Secret
          # Manager. It is an optional capability, so a disabled state is a
          # non-blocking warning rather than a smoke failure.
          echo "Checking /api/health..."
          HEALTH=$(curl -fsS "$URL/api/health")
          if echo "$HEALTH" | jq -e '.status == "ok"' > /dev/null 2>&1; then
            echo "✓ /api/health reports status: ok"
          else
            echo "✗ /api/health did not report status: ok"
            echo "Response: $HEALTH"
            exit 1
          fi
          if echo "$HEALTH" | jq -e '.tools.web_search == true' > /dev/null 2>&1; then
            echo "✓ web_search enabled"
          else
            echo "⚠ web_search disabled (TAVILY_API_KEY unset) — non-blocking"
          fi

          echo "All smoke checks passed."
