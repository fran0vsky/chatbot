# DinoAgents — host-level nginx reverse proxy (HTTP bootstrap)
#
# This is the PRE-CERTBOT bootstrap config: a single port-80 server block that
# already reverse-proxies the public domain to the backend container on
# localhost:3000 (which serves both /api/* and the Angular SPA, same-origin).
# Shipping HTTP-only lets nginx start and pass the ACME HTTP-01 challenge before
# any certificate exists (no chicken-and-egg with a 443 block referencing a
# not-yet-issued cert).
#
# To enable TLS on the VM:
#   1. Replace every {DOMAIN} below with the real hostname.
#   2. Copy to /etc/nginx/sites-available/dinoagents and symlink into
#      /etc/nginx/sites-enabled/, then `sudo nginx -t && sudo systemctl reload nginx`.
#   3. Run `sudo certbot --nginx -d {DOMAIN}`. certbot detects this server block,
#      obtains the cert, and AUTOMATICALLY augments this file: it adds a
#      `listen 443 ssl` server with the cert paths under
#      /etc/letsencrypt/live/{DOMAIN}/ and rewrites the port-80 block to 301-redirect
#      to HTTPS. It also installs the systemd renew timer.
#
# Do NOT hand-author a 443 block here — nginx will refuse to start without the cert.

server {
    listen 80;
    listen [::]:80;
    server_name {DOMAIN};

    # Allow pasted screenshots / image uploads through the proxy (rejected at the
    # edge above this size rather than buffered by the backend).
    client_max_body_size 25m;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # Forwarded headers — X-Forwarded-Proto lets the app know the public scheme
        # is https (set by certbot's 443 block after issuance).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / connection upgrade passthrough.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE token streaming: do not buffer, do not cache, and allow long-lived
        # connections. The backend also sends `X-Accel-Buffering: no` per response;
        # `proxy_buffering off` here is belt-and-suspenders.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
